<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" width="240" height="48">
  <defs>
    <linearGradient id="towerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#52a441"/>
      <stop offset="100%" style="stop-color:#74fe00"/>
    </linearGradient>
  </defs>

  <!-- Signal Tower Icon -->
  <g transform="translate(4, 2) scale(0.085)">
    <!-- Tower base -->
    <polygon points="230,460 282,460 270,260 242,260" fill="#52a441"/>
    <!-- Tower top -->
    <rect x="238" y="220" width="36" height="50" rx="4" fill="#52a441"/>
    <!-- Antenna -->
    <rect x="252" y="160" width="8" height="70" rx="4" fill="#52a441"/>
    <circle cx="256" cy="150" r="14" fill="#52a441"/>
    <!-- Signal arcs - left -->
    <path d="M220 200 Q180 150 220 100" fill="none" stroke="url(#towerGradient)" stroke-width="14" stroke-linecap="round"/>
    <path d="M190 220 Q130 150 190 75" fill="none" stroke="url(#towerGradient)" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
    <path d="M160 240 Q80 150 160 55" fill="none" stroke="url(#towerGradient)" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
    <!-- Signal arcs - right -->
    <path d="M292 200 Q332 150 292 100" fill="none" stroke="url(#towerGradient)" stroke-width="14" stroke-linecap="round"/>
    <path d="M322 220 Q382 150 322 75" fill="none" stroke="url(#towerGradient)" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
    <path d="M352 240 Q432 150 352 55" fill="none" stroke="url(#towerGradient)" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Text: Farwatch -->
  <text x="52" y="33" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#52a441">
    <tspan>Far</tspan><tspan fill="#2d5a25">watch</tspan>
  </text>
</svg>
